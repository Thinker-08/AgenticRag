mode: local
agent_mode: agentic
data_dir: ./data

llm:
  provider: fake
  model: gemma3:12b
  small_model: gemma3:4b
  host: http://localhost:11434

embedding:
  provider: bge_m3
  model: BAAI/bge-m3
  version: "1.5"
  dim: 1024

vectorstore:
  provider: memory
  collection: agrag_chunks
  quantize: none

reranker:
  provider: identity

verifier:
  provider: lexical
  tau_entail: 0.85
  tau_contra: 0.10

cache:
  provider: memory

tracer:
  provider: logging

parser:
  provider: text
  text_ratio_threshold: 0.1

chunker:
  provider: hierarchical
  child_size: 320
  parent_size: 1500

retrieval:
  over_fetch: 100
  rrf_k: 60
  top_k: 8

agent:
  wall_clock_s: 30.0
  token_budget: 20000
  max_iters: 3
  slot_concurrency: 4
